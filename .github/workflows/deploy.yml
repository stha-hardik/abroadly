name: Build & Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REPO_LOWER: stha-hardik/abroadly

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/frontend:latest

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Hostinger VPS redeploy
        run: |
          curl -sf -X PUT \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${{ secrets.HOSTINGER_VM_ID }}/docker-compose/${{ secrets.HOSTINGER_PROJECT_NAME }}" \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Content-Type: application/json"

      - name: Smoke-test live site
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' http://abroadly.online/ || true)
            echo "attempt $i: site=$code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Smoke test failed"
          exit 1
