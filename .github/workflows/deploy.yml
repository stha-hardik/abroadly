name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o StrictHostKeyChecking=yes \
              -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
              'cd /opt/abroadly && git fetch origin main && git reset --hard origin/main && docker compose -f docker-compose.prod.yml up -d --build --remove-orphans'

      - name: Smoke-test live site
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            site_code=$(curl -fsS -o /dev/null -w '%{http_code}' https://abroadly.online/ || true)
            api_code=$(curl -fsS -o /dev/null -w '%{http_code}' https://abroadly.online/api/health || true)
            echo "attempt $i: site=$site_code api=$api_code"
            if [ "$site_code" = "200" ] && [ "$api_code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Smoke test timed out"
          exit 1
