name: Build & Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REPO_LOWER: stha-hardik/abroadly

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/frontend:latest

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Hostinger Docker project
        env:
          HOSTINGER_VM_ID: ${{ secrets.HOSTINGER_VM_ID }}
          HOSTINGER_PROJECT_NAME: ${{ secrets.HOSTINGER_PROJECT_NAME }}
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail

          update_code=$(curl -sS -o /tmp/hostinger-update.json -w "%{http_code}" -X POST \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${{ secrets.HOSTINGER_VM_ID }}/docker/${{ secrets.HOSTINGER_PROJECT_NAME }}/update" \
            -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
            -H "Content-Type: application/json")

          if [ "$update_code" -ge 200 ] && [ "$update_code" -lt 300 ]; then
            echo "Updated existing Hostinger Docker project."
            exit 0
          fi

          echo "Update returned HTTP ${update_code}; creating project from docker-compose.yml."
          cat /tmp/hostinger-update.json || true

          env_text=$(cat <<EOF
          DB_PASSWORD=${DB_PASSWORD:-abroadly}
          GROQ_API_KEY=${GROQ_API_KEY:-}
          GEMINI_API_KEY=${GEMINI_API_KEY:-}
          CORS_ORIGINS=https://abroadly.online,http://abroadly.online
          EOF
          )

          jq -n \
            --arg project_name "${HOSTINGER_PROJECT_NAME}" \
            --rawfile content docker-compose.yml \
            --arg environment "$env_text" \
            '{project_name: $project_name, content: $content, environment: $environment}' \
            > /tmp/hostinger-create.json

          curl -sf -X POST \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker" \
            -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @/tmp/hostinger-create.json

      - name: Smoke-test live site
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' http://abroadly.online/ || true)
            echo "attempt $i: site=$code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 10
          done
          echo "Smoke test failed"
          exit 1
