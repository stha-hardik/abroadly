services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: abroadly
      POSTGRES_PASSWORD: ${DB_PASSWORD:-abroadly}
      POSTGRES_DB: abroadly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abroadly"]
      interval: 5s
      retries: 5

  backend:
    image: abroadly-backend:local
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql+asyncpg://abroadly:${DB_PASSWORD:-abroadly}@db:5432/abroadly
      CORS_ORIGINS: ${CORS_ORIGINS:-https://abroadly.online,http://abroadly.online}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-https://abroadly.online/auth/google/callback}
      APP_ENV: production
    volumes:
      # Persist Chroma + uploads across container recreates. Without these,
      # every `docker compose up --build` wipes the seeded knowledge base
      # (and any per-student uploaded docs) because the new container fs
      # starts empty. Defaults from app.core.config — chroma_dir=./chroma_db,
      # upload_dir=./uploads — resolve to /app/chroma_db and /app/uploads
      # inside the container (workdir is /app per backend/Dockerfile).
      - chroma_data:/app/chroma_db
      - uploads_data:/app/uploads

  frontend:
    image: abroadly-frontend:local
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      PORT: "80"
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  chroma_data:
  uploads_data:
  caddy_data:
  caddy_config:
