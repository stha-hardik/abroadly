services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: abroadly
      POSTGRES_PASSWORD: ${DB_PASSWORD:-abroadly}
      POSTGRES_DB: abroadly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abroadly"]
      interval: 5s
      retries: 5

  backend:
    image: abroadly-backend:local
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql+asyncpg://abroadly:${DB_PASSWORD:-abroadly}@db:5432/abroadly
      CORS_ORIGINS: ${CORS_ORIGINS:-https://abroadly.online,http://abroadly.online}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_ENV: production

  frontend:
    image: abroadly-frontend:local
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      PORT: "80"
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
