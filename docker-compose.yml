services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: abroadly
      POSTGRES_PASSWORD: ${DB_PASSWORD:-abroadly}
      POSTGRES_DB: abroadly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abroadly"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql+asyncpg://abroadly:${DB_PASSWORD:-abroadly}@db:5432/abroadly
      CORS_ORIGINS: ${CORS_ORIGINS:-https://abroadly.online,http://abroadly.online}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_ENV: production

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      PORT: "80"
    ports:
      - "80:80"

volumes:
  pgdata:
